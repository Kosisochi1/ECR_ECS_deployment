# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
  workflow_dispatch:
    inputs: 
      test_workflow:
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
        
permissions:
  contents: read
  security-events: write
jobs:

  pre-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_workflow == 'true'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Scan Repo for leaks
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true

    - name: Upload SARIF to Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
       sarif_file: results.sarif

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"
        cache: true
        cache-dependency-path: application-code/go.sum

    - name: Download Dependency
      working-directory: application-code
      run: go mod download

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Run Trivy vulnerability scanner in fs mode
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        trivy-config: trivy.yaml

    - name:    Unit Test
      working-directory: application-code
      run: |
        go test  ./... -v || echo "review manually"

    - name: Integration Test
      working-directory: application-code
      run: |
        INTEGRATION=true go test -v --tags=integration ./...
        
    - name: Vulnerabity Scan
      working-directory: application-code 
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck./... || echo "Vulnerability detected"

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: pre-build

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22


      - name: Configure AWS 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: eu-west-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t demo-app .
        
      - name: Tag Image
        run: |
        
          docker tag demo-app:latest ${{secrets.ECR_REPO}}:latest

      - name: Push Image 
        run:  docker push ${{ secrets.ECR_REPO }}:latest
   
          
    
     
  deploy:
    name: Deploy to secrets
    runs-on: ubuntu-latest
    needs: build


    steps:
      - name: Checkout Sources
        uses: actions/checkout@v4


      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: eu-west-1


      - name: Download Task Definition
        run: aws s3 cp ${{ secrets.TASK_DEF}} . 

    
    
